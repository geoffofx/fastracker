<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fast Tracker</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #121212;
            color: #ffffff;
        }
        .container { text-align: center; width: 80%; max-width: 400px; }
        progress {
            width: 100%;
            height: 30px;
            margin: 20px 0;
            accent-color: #4CAF50;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }
        button:active { background-color: #45a049; }
        #timer-display { font-size: 24px; font-variant-numeric: tabular-nums; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Fasting Progress</h2>
        <div id="timer-display">00h 00m 00s</div>
        <progress id="progress-bar" value="0" max="100"></progress>
        <button id="reset-btn">I Just Ate (Reset)</button>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
