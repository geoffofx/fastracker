<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fast Tracker</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #ffffff; /* Changed to white */
            color: #333333; /* Darkened text for contrast */
        }
        .container { 
            text-align: center; 
            width: 80%; 
            max-width: 400px; 
        }
        progress {
            width: 100%;
            height: 50px; /* Made significantly taller */
            margin: 20px 0;
            accent-color: #00B4D8; /* Tropical turquoise */
        }
        
        /* Specific styling for Safari/Chrome to ensure the tall progress bar looks good */
        progress::-webkit-progress-bar {
            background-color: #e0e0e0;
            border-radius: 10px;
        }
        progress::-webkit-progress-value {
            background-color: #00B4D8;
            border-radius: 10px;
        }
        progress::-moz-progress-bar {
            background-color: #00B4D8;
            border-radius: 10px;
        }

        button {
            padding: 18px 30px;
            font-size: 18px;
            font-weight: bold;
            background-color: #00B4D8; /* Tropical turquoise */
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.2s, transform 0.1s;
        }
        button:active { 
            background-color: #0096C7; /* Slightly darker on click */
            transform: translateY(2px); /* Click depression effect */
        }
        #timer-display { 
            font-size: 32px; 
            font-weight: 600;
            font-variant-numeric: tabular-nums; 
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Fasting Progress</h2>
        <div id="timer-display">00h 00m 00s</div>
        <progress id="progress-bar" value="0" max="100"></progress>
        <button id="reset-btn">I Just Ate (Reset)</button>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
